name: Refresh All Portfolio Data

on:
  push:
    branches:
      - main
    paths:
      - "scripts/**"
      - "portfolio.config.js"
      - "data/**"
      - ".github/workflows/**"
  schedule:
    # Backup refresh for all generated JSON. Staggered away from the other data jobs.
    - cron: "4,19,34,49 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set up Python for yfinance
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install market data tools
        run: python -m pip install "yfinance>=0.2.66,<2"

      - name: Preserve deployed dynamic data
        run: node scripts/preserve-deployed-data.mjs
        env:
          PRESERVE_DATA_BASE_URL: "https://silvaops-orbit.github.io/online-portfolio"
          PRESERVE_DATA_FILES: "steam.json,spotify.json,market.json,news.json,github.json,api-status.json"

      - name: Generate Steam data
        run: node scripts/update-steam-data.mjs
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          STEAM_ID: "76561199192411740"
          STEAM_ACCOUNT_VALUE: ${{ vars.STEAM_ACCOUNT_VALUE }}
          STEAMDB_ACCOUNT_VALUE: ${{ vars.STEAMDB_ACCOUNT_VALUE }}
          STEAM_ACHIEVEMENT_SCAN_LIMIT: "60"
          STEAM_ACHIEVEMENT_OUTPUT_LIMIT: "24"

      - name: Generate Spotify data
        run: node scripts/update-spotify-data.mjs
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          GENIUS_ACCESS_TOKEN: ${{ secrets.GENIUS_ACCESS_TOKEN }}
          AUDIODB_API_KEY: ${{ secrets.AUDIODB_API_KEY }}

      - name: Generate market and news data
        run: node scripts/update-market-news-data.mjs
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          MEDIASTACK_API_KEY: ${{ secrets.MEDIASTACK_API_KEY }}
          MEDIASTACK_ACCESS_KEY: ${{ secrets.MEDIASTACK_ACCESS_KEY }}

      - name: Generate GitHub snapshot
        run: node scripts/update-github-data.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_USERNAME: "SilvaOps-Orbit"

      - name: Generate integration status snapshot
        run: node scripts/update-api-status.mjs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
