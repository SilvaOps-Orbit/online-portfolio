name: Refresh Spotify Data

on:
  schedule:
    - cron: "1,6,11,16,21,26,31,36,41,46,51,56 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deployment-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Preserve deployed non-Spotify data
        run: node scripts/preserve-deployed-data.mjs
        env:
          PRESERVE_DATA_BASE_URL: "https://silvaops-orbit.github.io/online-portfolio"
          PRESERVE_DATA_FILES: "steam.json,market.json,news.json,github.json,api-status.json"

      - name: Generate Spotify data
        run: node scripts/update-spotify-data.mjs
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          GENIUS_ACCESS_TOKEN: ${{ secrets.GENIUS_ACCESS_TOKEN }}
          AUDIODB_API_KEY: ${{ secrets.AUDIODB_API_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
