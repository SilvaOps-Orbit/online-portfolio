name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "37 17 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Generate Steam data
        run: node scripts/update-steam-data.mjs
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          STEAM_ID: "76561199192411740"
          STEAM_ACCOUNT_VALUE: ${{ vars.STEAM_ACCOUNT_VALUE }}
          STEAMDB_ACCOUNT_VALUE: ${{ vars.STEAMDB_ACCOUNT_VALUE }}

      - name: Generate Spotify data
        run: node scripts/update-spotify-data.mjs
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          GENIUS_ACCESS_TOKEN: ${{ secrets.GENIUS_ACCESS_TOKEN }}
          AUDIODB_API_KEY: ${{ secrets.AUDIODB_API_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
