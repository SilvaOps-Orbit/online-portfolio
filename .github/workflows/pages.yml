name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deployment-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install React island dependencies
        run: npm ci

      - name: Build React TypeScript island
        run: npm run build:react

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Preserve deployed dynamic data
        run: node scripts/preserve-deployed-data.mjs
        env:
          PRESERVE_DATA_BASE_URL: "https://silvaops-orbit.github.io/online-portfolio"
          PRESERVE_DATA_FILES: "steam.json,spotify.json,market.json,news.json,github.json,api-status.json"

      - name: Refresh GitHub snapshot
        run: node scripts/update-github-data.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_USERNAME: "SilvaOps-Orbit"

      - name: Refresh integration status snapshot
        run: node scripts/update-api-status.mjs

      - name: Remove build-only dependencies
        run: rm -rf node_modules

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
