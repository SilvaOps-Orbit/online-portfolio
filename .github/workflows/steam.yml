name: Refresh Steam Activity

on:
  schedule:
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Preserve deployed non-Steam data
        run: node scripts/preserve-deployed-data.mjs
        env:
          PRESERVE_DATA_BASE_URL: "https://silvaops-orbit.github.io/online-portfolio"
          PRESERVE_DATA_FILES: "spotify.json,market.json,news.json,github.json"

      - name: Preserve deployed Steam data
        run: node scripts/preserve-deployed-data.mjs
        env:
          PRESERVE_DATA_BASE_URL: "https://silvaops-orbit.github.io/online-portfolio"
          PRESERVE_DATA_FILES: "steam.json"

      - name: Refresh full Steam data
        run: node scripts/update-steam-data.mjs
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          STEAM_ID: "76561199192411740"
          STEAM_ACCOUNT_VALUE: ${{ vars.STEAM_ACCOUNT_VALUE }}
          STEAMDB_ACCOUNT_VALUE: ${{ vars.STEAMDB_ACCOUNT_VALUE }}
          STEAM_ACHIEVEMENT_SCAN_LIMIT: "60"
          STEAM_ACHIEVEMENT_OUTPUT_LIMIT: "24"

      - name: Refresh Steam activity
        run: node scripts/update-steam-activity.mjs
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          STEAM_ID: "76561199192411740"

      - name: Refresh Steam Replay snapshot
        run: node scripts/update-steam-replay.mjs
        env:
          STEAM_REPLAY_URL: "https://s.team/y25/gnkcbvhr?l=english"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
