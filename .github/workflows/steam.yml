name: Refresh Steam Activity

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Preserve deployed Spotify data
        run: node scripts/preserve-deployed-data.mjs
        env:
          PRESERVE_DATA_BASE_URL: "https://silvaops-orbit.github.io/online-portfolio"
          PRESERVE_DATA_FILES: "spotify.json"

      - name: Preserve deployed Steam data
        run: node scripts/preserve-deployed-data.mjs
        env:
          PRESERVE_DATA_BASE_URL: "https://silvaops-orbit.github.io/online-portfolio"
          PRESERVE_DATA_FILES: "steam.json"

      - name: Refresh Steam activity
        run: node scripts/update-steam-activity.mjs
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          STEAM_ID: "76561199192411740"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
