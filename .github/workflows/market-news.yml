name: Refresh Market and News Data

on:
  schedule:
    # GitHub Actions scheduled workflows support a shortest interval of 5 minutes.
    # Start at minute 2 to avoid the busiest top-of-hour queue.
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deployment-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set up Python for yfinance
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install market data tools
        run: python -m pip install "yfinance>=0.2.66,<2"

      - name: Preserve deployed dynamic data
        run: node scripts/preserve-deployed-data.mjs
        env:
          PRESERVE_DATA_BASE_URL: "https://silvaops-orbit.github.io/online-portfolio"
          PRESERVE_DATA_FILES: "steam.json,spotify.json,market.json,news.json,github.json,api-status.json"

      - name: Generate market and news data
        run: node scripts/update-market-news-data.mjs
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          MEDIASTACK_API_KEY: ${{ secrets.MEDIASTACK_API_KEY }}
          MEDIASTACK_ACCESS_KEY: ${{ secrets.MEDIASTACK_ACCESS_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
