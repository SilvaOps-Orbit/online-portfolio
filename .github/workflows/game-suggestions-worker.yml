name: Deploy Game Suggestions Worker

on:
  push:
    branches:
      - main
    paths:
      - "game-suggestions-worker/**"
      - ".github/workflows/game-suggestions-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: game-suggestions-worker-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check deployment readiness
        id: readiness
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if test -n "$CLOUDFLARE_API_TOKEN" && test -n "$CLOUDFLARE_ACCOUNT_ID"; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Game suggestion deployment skipped. Add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID."
          fi

      - name: Check Worker JavaScript
        if: steps.readiness.outputs.ready == 'true'
        run: node --check game-suggestions-worker/src/index.js

      - name: Provision D1 and deploy Worker
        if: steps.readiness.outputs.ready == 'true'
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          list_json=$(curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/d1/database")
          database_id=$(printf '%s' "$list_json" | jq -r '.result[] | select(.name == "echoops-game-suggestions") | .uuid' | head -n 1)
          if test -z "$database_id"; then
            create_json=$(curl --fail-with-body --silent --show-error -X POST \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              --data '{"name":"echoops-game-suggestions"}' \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/d1/database")
            database_id=$(printf '%s' "$create_json" | jq -r '.result.uuid')
          fi
          test -n "$database_id" && test "$database_id" != "null"
          sed "s/00000000-0000-0000-0000-000000000000/$database_id/" wrangler.jsonc > wrangler.deploy.jsonc
          npx --yes wrangler@4 d1 execute echoops-game-suggestions --remote --file schema.sql --config wrangler.deploy.jsonc
          npx --yes wrangler@4 deploy --config wrangler.deploy.jsonc
        working-directory: game-suggestions-worker
